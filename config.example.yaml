# config.yaml 파일 내용 예시

paths:
  payment_excel: cp_payment.xlsx
  wau_excel: cp_wau.xlsx
  payment_gmv_sheet: null
  payment_gmv_header_row: null
  payment_gmv_col_date: null
  payment_gmv_col_acnt: null
  payment_gmv_col_gmv: null

# 네이버 뉴스 검색 API (openapi.naver.com/v1/search/news.json)
# Vercel 배포 시 프로젝트 환경변수 NAVER_CLIENT_ID, NAVER_CLIENT_SECRET 권장(파일보다 우선).
naver_search:
  client_id: 'YOUR_NAVER_CLIENT_ID'
  client_secret: 'YOUR_NAVER_CLIENT_SECRET'

confluence:
  space_key: 'PLAN'  # 위키에 올릴 게시판 이름 (예: PLAN)